    - data:
        code: "import json\n\ndef main(qdrant_results: str, rewritten_query: str)\
          \ -> dict:\n    if not qdrant_results or not qdrant_results.strip():\n \
          \       return {\n            \"reranker_documents\": \"[]\",\n        \
          \    \"candidate_docs\": \"[]\",\n            \"query_for_reranker\": rewritten_query\n\
          \        }\n    \n    data = json.loads(qdrant_results)\n    \n    # Unified\
          \ path returns {\"result\": [...]}; dual path returns merged list directly\n\
          \    if isinstance(data, list):\n        results = data\n    elif isinstance(data,\
          \ dict):\n        results = data.get(\"result\", {}).get(\"points\", [])\n\
          \    else:\n        results = []\n\n    documents = []\n    for r in results:\n\
          \        payload = r.get(\"payload\", {})\n        text = payload.get(\"\
          text\", \"\")\n        if not text:\n            continue\n        documents.append({\n\
          \            \"id\": str(r.get(\"id\", \"\")),\n            \"text\": text,\n\
          \            \"source\": payload.get(\"source\", \"unknown\"),\n       \
          \     \"category\": payload.get(\"category\", \"\"),\n            \"qdrant_score\"\
          : r.get(\"score\", 0)\n        })\n\n    return {\n        \"reranker_documents\"\
          : json.dumps([d[\"text\"] for d in documents]),\n        \"candidate_docs\"\
          : json.dumps(documents),\n        \"query_for_reranker\": rewritten_query\n\
          \    }"
        code_language: python3
