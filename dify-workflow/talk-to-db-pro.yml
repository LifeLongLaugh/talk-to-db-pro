    - data:
        code: "import re\n\ndef main(query: str) -> dict:\n    # Signals pointing\
          \ to a specific component (dual search)\n    dual_signals = [\n        r'\\\
          b[A-Z][a-zA-Z]+(?:Processor|Service|Pool|Reader|Writer|Controller)\\b',\
          \  # CamelCase component\n        r'\\bconfigure\\b',\n        r'\\bproperties\\\
          b',\n        r'\\bwhat does .+ do\\b',\n        r'\\bcontroller service\\\
          b',\n        r'\\bListSFTP|PutS3|GetFile|DBCPConnection|JsonPath\\b',  #\
          \ known processor names\n    ]\n    \n    for pattern in dual_signals:\n\
          \        if re.search(pattern, query, re.IGNORECASE):\n            return\
          \ {\"search_mode\": \"dual\"}\n    \n    return {\"search_mode\": \"unified\"\
          }"
        code_language: python3
