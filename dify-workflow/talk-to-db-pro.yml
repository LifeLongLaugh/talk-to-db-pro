    - data:
        code: "import json\n\ndef main(reranker_response: str, candidate_docs: str)\
          \ -> dict:\n    reranker_data = json.loads(reranker_response)\n    candidates\
          \ = json.loads(candidate_docs)\n    \n    # Build text → metadata lookup\n\
          \    id_lookup = {d[\"text\"]: d for d in candidates}\n    \n    results\
          \ = reranker_data.get(\"results\", [])\n    \n    passages = []\n    citation_map\
          \ = []\n    \n    for i, r in enumerate(results, 1):\n        # document\
          \ is a plain string, not a dict\n        doc = r.get(\"document\", \"\"\
          )\n        text = doc if isinstance(doc, str) else doc.get(\"text\", \"\"\
          )\n        \n        relevance_score = r.get(\"relevance_score\", 0)\n \
          \       original = id_lookup.get(text, {})\n        source = original.get(\"\
          source\", \"unknown\")\n        \n        passages.append(f\"[{i}] (source:\
          \ {source})\\n{text}\")\n        citation_map.append({\n            \"citation_num\"\
          : i,\n            \"doc_id\": original.get(\"id\", \"unknown\"),\n     \
          \       \"relevance_score\": round(relevance_score, 4),\n            \"\
          snippet\": text[:120] + \"...\" if len(text) > 120 else text\n        })\n\
          \    \n    return {\n        \"context_passages\": \"\\n\\n\".join(passages),\n\
          \        \"citations_metadata\": json.dumps(citation_map, indent=2)\n  \
          \  }"
        code_language: python3
